<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Cardapio</title>

<!-- CSS -->
<link rel="stylesheet" href="styleCardapio.css">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ======================= BARRA SUPERIOR ======================= -->
<div class="barra-superior">
    <div class="container-barra">
        <button class="btn-entrar">Entrar</button>

        <button class="btn-carrinho">
            <i class="fas fa-shopping-cart"></i> Meu Carrinho
        </button>
    </div>
</div>


<!-- ======================= TOPO DO RESTAURANTE ======================= -->
<header class="topo-cardapio">
    <div class="img-fundo">
        <img src="./Imagem/LogoTipo.png" alt="Fundo do Topo">
    </div>
</header>


<!-- ======================= CONTAINER EMPRESA ======================= -->

<section class="container-empresa">

    <!-- CARD DA LOGO -->
    <section class="card-restaurante">

        <div class="logo-restaurante">
            <img src="./Imagem/LogoTipo.png" alt="Logo da Empresa">
        </div>

    </section>


    <!-- INFORMAÇÕES DA EMPRESA (lado direito) -->

    <div class="info-restaurante">

        <h1 class="nome-restaurante">
            Nome da Empresa
        </h1>

        <p class="descricao-restaurante">
            Bem-vindo ao nosso cardápio
        </p>

    </div>

</section>

<!-- ======================= PESQUISA ======================= -->

<div class="area-pesquisa">

    <div class="container-pesquisa">

        <input 
            type="text" 
            id="campoPesquisa" 
            placeholder="Pesquisar produto..."
        >

        <button class="btn-pesquisa">
            <i class="fas fa-search"></i>
        </button>

    </div>

</div>

<!-- ======================= CARDÁPIO ======================= -->

<main id="cardapioContainer">

<!-- 
As categorias serão criadas automaticamente pelo JavaScript
-->

</main>



<!-- ======================= LOADING ======================= -->

<div id="loadingCardapio">
<p>Carregando cardápio...</p>
</div>



<!-- ======================= SCRIPTS ======================= -->

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


<!-- ================= MODAL CARRINHO ================= -->
<div id="modalCarrinho" class="modal-carrinho">

  <div class="modal-carrinho-content">

    <!-- Botão fechar -->
    <span class="fechar-carrinho" id="fecharCarrinho">&times;</span>

    <!-- Título -->
    <h2 class="titulo-carrinho">Seu Carrinho</h2>

    <!-- Lista de produtos (JS vai preencher) -->
    <div id="listaCarrinho" class="lista-carrinho">
      <!-- Produtos adicionados via JavaScript -->
    </div>

    <!-- Resumo da compra -->
    <div class="resumo-carrinho">

      <div class="linha-resumo">
        <span>Subtotal</span>
        <span id="subtotalCarrinho">R$ 0,00</span>
      </div>

      <div class="linha-resumo">
        <span>Frete</span>
        <span id="freteCarrinho">Calcular</span>
      </div>

      <div class="linha-total">
        <span>Total</span>
        <span id="totalCarrinho">R$ 0,00</span>
      </div>

    </div>

    <!-- Botão finalizar -->
    <button id="btnFinalizarPedido" class="btn-finalizar">
      Finalizar Pedido
    </button>

  </div>

</div>
<!-- SCRIPT DO CARDÁPIO -->
<script type="module" src="scriptCardapio.js"></script>

</body>

</html>
