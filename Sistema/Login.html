<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Painel Administrativo</title>
  <!-- Para tema claro -->
<meta name="theme-color" content="#03305c" media="(prefers-color-scheme: light)">

<!-- Para tema escuro -->
<meta name="theme-color" content="#03305c" media="(prefers-color-scheme: dark)">
<link rel="icon" type="image/png" href="../Imagem/LogoTipo.png">

<!-- Link externo para o CSS -->
<link rel="stylesheet" href="login.css">

</head>

<body>

<form id="loginForm" onsubmit="return false;">
  <!-- LOGO DO SISTEMA -->
  <div class="logo-container">
    <img src="../Imagem/LogoTipo.png" alt="Logo do Sistema" class="logo-sistema">
  </div>

  <h2>Acessar Sistema</h2>
  <!-- Aqui será exibido o IP -->
  <p id="userIP" style="font-weight:bold; cursor:pointer;">Seu IP: carregando...</p>
  <p class="boas-vindas">Faça login para gerenciar seu cardápio</p>

  <input type="text" id="nome" placeholder="Usuário" autocomplete="username">
  <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
  <button id="btnEntrar">Login</button>

  <!-- Mensagem de boas-vindas -->
 <p id="mensagemBoasVindas" class="boas-vindas-usuario"></p>
  <!-- RODAPÉ COM NOME DA EMPRESA -->
  <p class="rodape-empresa">© 2026 Sua Empresa</p>
</form>

<!--modais-->
<!-- MODAL DE ERRO -->
<div id="modalErro" class="modal-erro">
  <div class="modal-conteudo-erro">
    <p id="mensagemErro"></p>
    <button id="btnFecharErro">OK</button>
  </div>
</div>

<!-- Modal do IP -->
<div id="modalIP" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3>Informações da Rede</h3>
      <span class="close">&times;</span>
    </div>
    <div class="modal-body">
      <p id="modalMessage"></p>
    </div>
    <div class="modal-footer">
      <button id="btnCloseModal">Fechar</button>
    </div>
  </div>
</div>
<script type="module" src="login.js"></script>

</body>
</html>
